name: CCQuick
options:
  bundleIdPrefix: com.ccquick
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  CCQuick:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: CCQuick
    dependencies:
      - package: MarkdownUI
    info:
      path: CCQuick/Resources/Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ccquick.app
      CODE_SIGN_ENTITLEMENTS: CCQuick/CCQuick.entitlements
      INFOPLIST_FILE: CCQuick/Resources/Info.plist
      PRODUCT_NAME: CCQuick

  CCQuickTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: CCQuickTests
    dependencies:
      - target: CCQuick
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ccquick.tests
      GENERATE_INFOPLIST_FILE: YES
