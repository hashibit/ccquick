name: CCQuick
options:
  bundleIdPrefix: com.ccquick
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  CCQuick:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: CCQuick
    info:
      path: CCQuick/Resources/Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ccquick.app
      CODE_SIGN_ENTITLEMENTS: CCQuick/CCQuick.entitlements
      INFOPLIST_FILE: CCQuick/Resources/Info.plist
      PRODUCT_NAME: CCQuick
